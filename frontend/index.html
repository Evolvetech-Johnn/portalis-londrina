<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <title>Portalis — Geração de Leads para Imobiliárias e Corretores</title>
    <meta
      name="description"
      content="A Portalis conecta imobiliárias e corretores a compradores e locatários qualificados via tráfego pago. Leads previsíveis. Escala real."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://portalis.com.br" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://portalis.com.br" />
    <meta property="og:title"       content="Portalis — Leads Qualificados para o Mercado Imobiliário" />
    <meta property="og:description" content="Tráfego pago especializado para imobiliárias e corretores de alto desempenho. Resultados previsíveis, escala real." />
    <meta property="og:image"       content="https://portalis.com.br/og-image.jpg" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Portalis — Leads Qualificados para o Mercado Imobiliário" />
    <meta name="twitter:description" content="Tráfego pago especializado para imobiliárias e corretores de alto desempenho." />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!--
      ── Google Fonts ──────────────────────────────────────────────────────
      Estratégia de carregamento de performance:
      1. preconnect nas origens do Google Fonts
      2. DM Serif Display: apenas peso 400 (não tem variações de peso)
      3. Inter: Variable Font (wght 100–900) — UMA requisição cobre tudo,
         sem fallback de múltiplos pesos estáticos. Melhor Lighthouse score.
      ─────────────────────────────────────────────────────────────────────
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- 
      ── Rastreamento (SEO & Ads) ──────────────────────────────────────────
      Cole o código base do Pixel da Meta (Facebook) abaixo:
      <script>
        !function(f,b,e,v,n,t,s) ... fbq('init', 'SEU_PIXEL_ID'); fbq('track', 'PageView');
      </script>
      
      Cole o código base da Tag do Google (gtag.js) abaixo:
      <script async src="https://www.googletagmanager.com/gtag/js?id=AW-SEU_CONVERSIONS_ID"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'AW-SEU_CONVERSIONS_ID');
      </script>
      ─────────────────────────────────────────────────────────────────────
    -->
  </head>

  <body class="bg-obsidian-900 text-slate-50 antialiased">
    <!-- 
      Cole o <noscript> do Google Tag Manager (se usar) ou Meta Pixel aqui:
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
